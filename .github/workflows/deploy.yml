# Per-tenant build matrix. One commit to main rebuilds every live tenant, so a
# shared code/design change propagates to all branded sites at once. Each tenant
# produces its own Docker image (TENANT build-arg) for its own domain.
#
# NOTE: the registry login + deploy steps are infra-specific and left as TODO —
# fill in your container registry and host (the build + tag steps are ready).
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add a tenant here (and a domain mapping) when it goes live. Quebec City
        # joins once it has a domain + confirmed NAP.
        tenant: [maily-beauport, ongles-charlesbourg, ongles-rivieres]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # TODO: authenticate to your container registry, e.g.
      # - uses: docker/login-action@v3
      #   with:
      #     registry: ${{ secrets.REGISTRY }}
      #     username: ${{ secrets.REGISTRY_USER }}
      #     password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build image for ${{ matrix.tenant }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false # TODO: set true once registry login is configured
          tags: maily-website:${{ matrix.tenant }}
          build-args: |
            TENANT=${{ matrix.tenant }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}

      # TODO: deploy maily-website:${{ matrix.tenant }} to that tenant's host/domain.
