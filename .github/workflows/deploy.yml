# Build the single tenant-agnostic image. One commit to main produces ONE universal
# image that bundles every tenant; each container picks its brand at RUNTIME via its
# TENANT env var (plus server-only SUPABASE_*), configured per app in Dokploy. There
# is no per-tenant build and no build-args — the same image serves every domain.
#
# NOTE: the registry login + deploy steps are infra-specific and left as TODO —
# fill in your container registry and host (the build + tag steps are ready).
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # TODO: authenticate to your container registry, e.g.
      # - uses: docker/login-action@v3
      #   with:
      #     registry: ${{ secrets.REGISTRY }}
      #     username: ${{ secrets.REGISTRY_USER }}
      #     password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build universal image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false # TODO: set true once registry login is configured
          tags: maily-website:latest

      # TODO: deploy maily-website:latest to every tenant's host/domain. TENANT and
      # SUPABASE_* are RUNTIME env (set per app in Dokploy), not build-args.
