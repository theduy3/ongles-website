name: CI

# Runs the Playwright e2e suite on every PR and on pushes to main. This is the
# gate that catches the drift that previously rotted uncaught (deploys go via a
# Dokploy webhook, which runs no tests). See issue #44.
#
# Install with `npm ci` (package-lock.json): both the e2e build and (a future)
# bun:test job resolve React 19 through npm's hoisted node_modules layout. Deploy
# still uses bun --frozen-lockfile in Dokploy; that's a separate concern.
#
# The unit job installs bun via the official curl script, NOT setup-bun@v2:
# setup-bun's bun made bun:test crash resolving React 19 through next/navigation
# ("createContext is not a function") — a failure that does NOT reproduce with a
# curl-installed bun on the same OS. The e2e job keeps setup-bun (it drives
# playwright, not bun:test, and is unaffected).
#
# NOT run here: tests/integration (needs Docker + a local Supabase — `bun run
# test:integration`, local/manual only, per ADR 0009).

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: these jobs only read the checkout; they never write to the repo
# or use the token. (The reviews-fetch workflow keeps its own contents: write.)
permissions:
  contents: read

jobs:
  unit:
    name: Unit tests (bun test src/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install bun (official script — see header note)
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.14"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      - run: npm ci
      - run: bun test src/

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: npm ci
      # Chromium only — the suite runs a single project (see playwright.config).
      - run: bunx playwright install --with-deps chromium
      # webServer builds a prod bundle and serves it; playwright.config pins
      # TENANT=ongles-maily. CI=true → fresh server, retries, github reporter.
      - run: bunx playwright test
      - if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
