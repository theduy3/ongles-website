name: CI

# Runs the Playwright e2e suite on every PR and on pushes to main. This is the
# gate that catches the drift that previously rotted uncaught (deploys go via a
# Dokploy webhook, which runs no tests). See issue #44.
#
# Install with `npm ci` (package-lock.json): both the e2e build and (a future)
# bun:test job resolve React 19 through npm's hoisted node_modules layout. Deploy
# still uses bun --frozen-lockfile in Dokploy; that's a separate concern.
#
# NOT gated here yet — the hermetic `bun test src/` unit suite is GREEN locally
# but fails on a clean install (bun:test + next/navigation React ESM crash, plus
# a few getSeo legacy-shim failures). Tracked separately; add a `unit` job once
# that clean-install breakage is fixed.
#
# NOT run here: tests/integration (needs Docker + a local Supabase — `bun run
# test:integration`, local/manual only, per ADR 0009).

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: npm ci
      # Chromium only — the suite runs a single project (see playwright.config).
      - run: bunx playwright install --with-deps chromium
      # webServer builds a prod bundle and serves it; playwright.config pins
      # TENANT=ongles-maily. CI=true → fresh server, retries, github reporter.
      - run: bunx playwright test
      - if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
